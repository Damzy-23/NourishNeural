<!DOCTYPE html>
<html>
<head>
    <title>Clear PantryPal Data</title>
</head>
<body>
    <h1>Clear PantryPal Data</h1>
    <p>This will clear all stored user data and force a fresh start.</p>
    
    <button onclick="clearAllData()">Clear All Data</button>
    
    <div id="status"></div>

    <script>
        function clearAllData() {
            try {
                // Clear localStorage
                localStorage.removeItem('pantrypal_token');
                localStorage.removeItem('pantrypal_user');
                
                // Clear sessionStorage
                sessionStorage.clear();
                
                // Clear all cookies
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });
                
                document.getElementById('status').innerHTML = 
                    '<p style="color: green;">✅ All data cleared successfully!</p>' +
                    '<p>Now:</p>' +
                    '<ol>' +
                    '<li>Close this tab</li>' +
                    '<li>Go back to PantryPal</li>' +
                    '<li>Register a new account with your real information</li>' +
                    '<li>Check the profile page</li>' +
                    '</ol>';
                    
            } catch (error) {
                document.getElementById('status').innerHTML = 
                    '<p style="color: red;">❌ Error clearing data: ' + error.message + '</p>';
            }
        }
        
        // Show current data
        window.onload = function() {
            const token = localStorage.getItem('pantrypal_token');
            const user = localStorage.getItem('pantrypal_user');
            
            let status = '<h3>Current Data:</h3>';
            status += '<p><strong>Token:</strong> ' + (token ? 'Present' : 'None') + '</p>';
            status += '<p><strong>User:</strong> ' + (user ? 'Present' : 'None') + '</p>';
            
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    status += '<p><strong>User Email:</strong> ' + userData.email + '</p>';
                    status += '<p><strong>User Name:</strong> ' + userData.firstName + ' ' + userData.lastName + '</p>';
                } catch (e) {
                    status += '<p><strong>User Data:</strong> Invalid JSON</p>';
                }
            }
            
            document.getElementById('status').innerHTML = status;
        };
    </script>
</body>
</html>
